Redhat = "َ±„›"
RedHatEnterprise = "َ±„›"

[hostname]
ssh_only = false
ssh_symbol = "َ±ک– "
trim_at = "."
style = "bg:peach fg:crust"
format = "[$hostname$ssh_symbol ]($style)"

[container]
symbol = "ï’· "
format = "[$symbol$name ]($style)"
style = "bg:peach fg:crust"

# -------------------------------- level 3
[username]
show_always = true
style_user = "bg:yellow fg:crust"
style_root = "bg:yellow fg:red"
format = "[ï“؟ $user ]($style)"

# -------------------------------- level 4
[directory]
truncation_length = 5
truncation_symbol = "â€¦"
truncate_to_repo = false
use_os_path_sep = false
fish_style_pwd_dir_length = 1
style = "bg:green fg:crust"
before_repo_root_style = "bg:green fg:base"
repo_root_style = "bg:green fg:mantle"
repo_root_format = '[îœ† $repo_root ]($repo_root_style)[َ°‰‹ $path ]($style)'
format = "[َ°‰‹ $path ]($style)"

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = "ï€™ "
"Music" = "َ°‌ڑ "
"Pictures" = "ï€¾ "
"Developer" = "َ°²‹ "

# -------------------------------- level 5
[git_branch]
disabled = false
style = "bg:sapphire fg:crust"
format = '[$symbol$branch(:$remote_branch) ]($style)'

[git_commit]
disabled = false
style = "bg:sapphire fg:crust"
format = '[\($hash$tag\) ]($style)'

[git_state]
disabled = false
style = "bg:sapphire fg:crust"
format = '\([$state( $progress_current/$progress_total) ]($style)\)'

[git_metrics]
disabled = false
added_style = "bg:sapphire fg:crust"
deleted_style = "bg:sapphire fg:crust"
format = '([+$added ]($added_style))([-$deleted ]($deleted_style))'

[git_status]
disabled = false
style = "bg:sapphire fg:crust"
format = '([\[$all_status$ahead_behind\] ]($style))'

[custom.jj]
disabled = false
symbol = ""
style = "bg:sapphire fg:crust"
format = '[$output]($style)'
when = true
shell = ["jj-starship", "--no-color"]

[custom.vcs_status]
when = true
command = "jj root >/dev/null 2>&1; [[ $? -eq 0 ]] && starship module custom.jj || (starship module git_branch; starship module git_commit; starship module git_state; starship module git_metrics; starship module git_status )"
style = "bg:sapphire fg:crust"
format = "$output"
shell = 'bash'

# -------------------------------- level 6
[cmd_duration]
min_time = 0
show_milliseconds = true
show_notifications = false
min_time_to_notify = 60000
style = "bg:lavender fg:crust"
format = "[َ±ژ« $duration ]($style)"
disabled = false

[status]
disabled = false
symbol = "îھ‡ "
success_symbol = "ïپک "
signal_symbol = "َ±گ‹ "
style = "bg:lavender fg:crust"
failure_style = "bg:red fg:crust bold"
format = "[$symbol$status$signal_name$maybe_int ]($style)"

# -------------------------------- prompt line
[character]
disabled = false
success_symbol = '[â‌¯](bold fg:green)'
error_symbol = '[â‌¯](bold fg:red)'
vimcmd_symbol = '[â‌®](bold fg:green)'
vimcmd_replace_one_symbol = '[â‌®](bold fg:lavender)'
vimcmd_replace_symbol = '[â‌®](bold fg:lavender)'
vimcmd_visual_symbol = '[â‌®](bold fg:yellow)'

