# -------------------------------- level 1
[shlvl]
disabled = false
threshold = 2
symbol = "َ°کچ "
repeat = true
repeat_offset = 1
style = "bg:red fg:crust"
format = '[$symbol]($style)'

[shell]
disabled = false
style = "bg:red fg:crust"
format = '[$indicatorîڑ‘ ]($style)'

# -------------------------------- level 2
[os]
disabled = false
style = "bg:peach fg:crust"

[os.symbols]
Windows = "îœڈ"
Ubuntu = "َ°•ˆ"
SUSE = "ïŒ”"
Raspbian = "َ°گ؟"
Mint = "َ°£­"
Macos = "َ°€µ"
Manjaro = "ïŒ’"
Linux = "َ°Œ½"
Gentoo = "َ°£¨"
Fedora = "َ°£›"
